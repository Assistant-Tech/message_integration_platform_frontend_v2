services:
  frontend:
    container_name: chatblix-frontend-staging
    build:
      context: .
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL}
        VITE_CLOUDINARY_BASE_URL: ${VITE_CLOUDINARY_BASE_URL}
        VITE_NEWSLETTER_MODAL_KEY: ${VITE_NEWSLETTER_MODAL_KEY}
    ports:
      - "127.0.0.1:8081:8080"
    restart: unless-stopped
    env_file:
      - .env.staging
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8080/ >/dev/null 2>&1 || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - chatblix-frontend-staging-network

networks:
  chatblix-frontend-staging-network:
    driver: bridge

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- Responsive design: scales page to device width -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Short description for SEO: appears in search engine results -->
    <meta
      name="description"
      content="Chatblix - Seamlessly connect, manage, and streamline all your messaging services in one unified dashboard."
    />

    <!-- Set author info: optional but useful for credibility -->
    <meta name="author" content="Chatblix" />

    <!-- Set relevant keywords for SEO: helps search engines categorize content -->
    <meta
      name="keywords"
      content="Chatblix, messaging, chat integration, communication dashboard, chat management, unified message, store, e-commerce, artificial intelligence, ai"
    />

    <!-- Ensure correct character rendering on all browsers -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Open Graph: controls appearance when sharing on social media -->
    <meta property="og:title" content="Chatblix" />
    <meta
      property="og:description"
      content="Seamlessly connect, manage, and streamline all your messaging services in one unified dashboard."
    />
    <meta
      property="og:image"
      content="https://chatblix.com/src/app/assets/icons/logo.png"
    />
    <meta property="og:url" content="https://chatblix.com/" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card: controls appearance when sharing on X / Thread-->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Chatblix" />
    <meta
      name="twitter:description"
      content="Seamlessly connect, manage, and streamline all your messaging services in one unified dashboard."
    />
    <meta
      name="twitter:image"
      content="https://chatblix.com/src/app/assets/icons/logo.svg"
    />

    <!-- Canonical link: avoids SEO penalties for duplicate content -->
    <link rel="canonical" href="https://chatblix.com/" />

    <!-- Preload critical resources -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700&display=swap"></noscript>
    
    <!-- Preload hero images -->
    <link rel="preload" as="image" href="https://res.cloudinary.com/dtoqwn0gx/image/upload/w_800/v1753920902/dash1_qvgd1t.png" media="(min-width: 768px)">
    <link rel="preload" as="image" href="https://res.cloudinary.com/dtoqwn0gx/image/upload/w_400/v1753920902/dash1_qvgd1t.png" media="(max-width: 767px)">
    
    <!-- DNS prefetch for external domains -->
    <link rel="dns-prefetch" href="//res.cloudinary.com">
    <link rel="dns-prefetch" href="//fonts.googleapis.com">
    <link rel="dns-prefetch" href="//fonts.gstatic.com">

    <title>Chatblix | Unified Messaging Solution</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
